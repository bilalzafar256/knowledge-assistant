name: Telegram PR

# Triggered when the user approves the code diff via /api/telegram/webhook.
# Opens a PR from the already-pushed branch into `dev`, saves the URL to
# telegram_tasks, marks the task done, and sends the URL to Telegram.

on:
  repository_dispatch:
    types: [pr-task]

jobs:
  pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Neon client
        run: npm install --no-save @neondatabase/serverless

      - name: Open PR + finalize
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_ID: ${{ github.event.client_payload.task_id }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: node .github/scripts/telegram-open-pr.mjs

      - name: Notify failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          TASK_ID: ${{ github.event.client_payload.task_id }}
        run: |
          SHORT=$(echo "$TASK_ID" | cut -c1-8)
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$CHAT_ID" \
            --data-urlencode "text=❌ Opening the PR failed · task \`$SHORT\`. Check GitHub Actions logs." \
            --data-urlencode "parse_mode=Markdown"
